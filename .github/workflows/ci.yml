name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install platformdirs (user cache path matches resolver)
        run: python -m pip install -q "platformdirs>=4"
      - name: Resolve pyp9m4 user cache directory
        shell: bash
        run: |
          python - <<'PY'
          import os
          from platformdirs import user_cache_dir
          path = user_cache_dir("pyp9m4", False)
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write(f"PYP9M4_CACHE={path}\n")
          PY
      - name: Cache LADR binaries (pinned release in pyp9m4/resolver.py)
        uses: actions/cache@v4
        with:
          path: ${{ env.PYP9M4_CACHE }}
          key: ladr-${{ runner.os }}-${{ hashFiles('pyp9m4/resolver.py') }}
          restore-keys: |
            ladr-${{ runner.os }}-
      - name: Install package (dev + bridge extras)
        run: pip install -e ".[dev,smt]"
      - name: Tests (unit, CLI help alignment, e2e corpus)
        run: pytest -q --tb=short
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

